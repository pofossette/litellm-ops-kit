services:
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm-ops-kit
    restart: unless-stopped
    env_file:
      - .env
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
      - --host
      - 0.0.0.0
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
