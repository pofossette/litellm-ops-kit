model_list:
  - model_name: my-opus
    litellm_params:
      model: anthropic/glm-5.1
      api_base: os.environ/MAIN_ANTHROPIC_API_BASE
      api_key: os.environ/MAIN_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/MAIN_ANTHROPIC_API_KEY

  - model_name: openai-high
    litellm_params:
      model: openai/glm-5.1
      api_base: os.environ/MAIN_OPENAI_API_BASE
      api_key: os.environ/MAIN_OPENAI_API_KEY

  - model_name: my-opus-fallback
    litellm_params:
      model: anthropic/GLM-5
      api_base: os.environ/FALLBACK_ANTHROPIC_API_BASE
      api_key: os.environ/FALLBACK_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/FALLBACK_ANTHROPIC_API_KEY

  - model_name: openai-high-fallback
    litellm_params:
      model: openai/GLM-5
      api_base: os.environ/FALLBACK_OPENAI_API_BASE
      api_key: os.environ/FALLBACK_OPENAI_API_KEY

  - model_name: my-sonnet
    litellm_params:
      model: anthropic/glm-5-turbo
      api_base: os.environ/MAIN_ANTHROPIC_API_BASE
      api_key: os.environ/MAIN_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/MAIN_ANTHROPIC_API_KEY

  - model_name: openai-medium
    litellm_params:
      model: openai/glm-5-turbo
      api_base: os.environ/MAIN_OPENAI_API_BASE
      api_key: os.environ/MAIN_OPENAI_API_KEY

  - model_name: my-sonnet-fallback
    litellm_params:
      model: anthropic/GLM-5
      api_base: os.environ/FALLBACK_ANTHROPIC_API_BASE
      api_key: os.environ/FALLBACK_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/FALLBACK_ANTHROPIC_API_KEY

  - model_name: openai-medium-fallback
    litellm_params:
      model: openai/GLM-5
      api_base: os.environ/FALLBACK_OPENAI_API_BASE
      api_key: os.environ/FALLBACK_OPENAI_API_KEY

  - model_name: my-haiku
    litellm_params:
      model: anthropic/cm-code-latest
      api_base: os.environ/MAIN_HAIKU_ANTHROPIC_API_BASE
      api_key: os.environ/MAIN_HAIKU_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/MAIN_HAIKU_ANTHROPIC_API_KEY

  - model_name: openai-low
    litellm_params:
      model: openai/cm-code-latest
      api_base: os.environ/MAIN_OPENAI_API_BASE
      api_key: os.environ/MAIN_OPENAI_API_KEY

  - model_name: my-haiku-fallback
    litellm_params:
      model: anthropic/cm-code-latest
      api_base: os.environ/FALLBACK_HAIKU_ANTHROPIC_API_BASE
      api_key: os.environ/FALLBACK_HAIKU_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/FALLBACK_HAIKU_ANTHROPIC_API_KEY

  - model_name: openai-low-fallback
    litellm_params:
      model: openai/cm-code-latest
      api_base: os.environ/FALLBACK_OPENAI_API_BASE
      api_key: os.environ/FALLBACK_OPENAI_API_KEY

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  drop_params: false
  set_verbose: true

router_settings:
  num_retries: 2
  timeout: 120
  fallbacks:
    - {"my-opus": ["my-opus-fallback"]}
    - {"openai-high": ["openai-high-fallback"]}
    - {"my-sonnet": ["my-sonnet-fallback"]}
    - {"openai-medium": ["openai-medium-fallback"]}
    - {"my-haiku": ["my-haiku-fallback"]}
    - {"openai-low": ["openai-low-fallback"]}
