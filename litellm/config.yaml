model_list:
  - model_name: my-opus
    litellm_params:
      model: anthropic/os.environ/MAIN_OPUS_MODEL
      api_base: os.environ/MAIN_ANTHROPIC_API_BASE
      api_key: os.environ/MAIN_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/MAIN_ANTHROPIC_API_KEY

  - model_name: openai-high
    litellm_params:
      model: openai/glm-5.1
      api_base: os.environ/MAIN_OPENAI_API_BASE
      api_key: os.environ/MAIN_OPENAI_API_KEY

  - model_name: my-opus-fallback
    litellm_params:
      model: anthropic/GLM-5
      api_base: http://jdcloud-anthropic-shim:8081/fallback
      api_key: os.environ/FALLBACK_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/FALLBACK_ANTHROPIC_API_KEY

  - model_name: openai-high-fallback
    litellm_params:
      model: openai/GLM-5
      api_base: os.environ/FALLBACK_OPENAI_API_BASE
      api_key: os.environ/FALLBACK_OPENAI_API_KEY

  - model_name: my-sonnet
    litellm_params:
      model: anthropic/os.environ/MAIN_SONNET_MODEL
      api_base: os.environ/MAIN_ANTHROPIC_API_BASE
      api_key: os.environ/MAIN_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/MAIN_ANTHROPIC_API_KEY

  - model_name: openai-medium
    litellm_params:
      model: openai/glm-5-turbo
      api_base: os.environ/MAIN_OPENAI_API_BASE
      api_key: os.environ/MAIN_OPENAI_API_KEY

  - model_name: my-sonnet-fallback
    litellm_params:
      model: anthropic/GLM-5
      api_base: http://jdcloud-anthropic-shim:8081/fallback
      api_key: os.environ/FALLBACK_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/FALLBACK_ANTHROPIC_API_KEY

  - model_name: openai-medium-fallback
    litellm_params:
      model: openai/GLM-5
      api_base: os.environ/FALLBACK_OPENAI_API_BASE
      api_key: os.environ/FALLBACK_OPENAI_API_KEY

  - model_name: my-haiku
    litellm_params:
      model: anthropic/os.environ/MAIN_HAIKU_MODEL
      api_base: os.environ/MAIN_ANTHROPIC_API_BASE
      api_key: os.environ/MAIN_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/MAIN_ANTHROPIC_API_KEY

  - model_name: openai-low
    litellm_params:
      model: openai/glm-4.7
      api_base: os.environ/MAIN_OPENAI_API_BASE
      api_key: os.environ/MAIN_OPENAI_API_KEY

  - model_name: my-haiku-fallback
    litellm_params:
      model: anthropic/DeepSeek-V3.2
      api_base: http://jdcloud-anthropic-shim:8081/fallback
      api_key: os.environ/FALLBACK_ANTHROPIC_API_KEY
      extra_headers:
        x-api-key: os.environ/FALLBACK_ANTHROPIC_API_KEY

  - model_name: openai-low-fallback
    litellm_params:
      model: openai/DeepSeek-V3.2
      api_base: os.environ/FALLBACK_OPENAI_API_BASE
      api_key: os.environ/FALLBACK_OPENAI_API_KEY

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  drop_params: false
  set_verbose: true
  allowed_origins: ["http://192.168.5.214:4000", "http://localhost:4000", "http://192.168.5.214:3000", "http://localhost:3000"]

router_settings:
  num_retries: 2
  timeout: 120
  fallbacks:
    - {"my-opus": ["my-opus-fallback"]}
    - {"openai-high": ["openai-high-fallback"]}
    - {"my-sonnet": ["my-sonnet-fallback"]}
    - {"openai-medium": ["openai-medium-fallback"]}
    - {"my-haiku": ["my-haiku-fallback"]}
    - {"openai-low": ["openai-low-fallback"]}
