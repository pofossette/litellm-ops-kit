services:
  postgres:
    image: postgres:16-alpine
    container_name: litellm-ops-kit-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm-local-password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm} -d ${POSTGRES_DB:-litellm}"]
      interval: 10s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm-database:main-stable
    container_name: litellm-ops-kit
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    command:
      - --config
      - /app/config.yaml
      - --port
      - "${LITELLM_PORT:-4000}"
      - --host
      - 0.0.0.0
    ports:
      - "${LITELLM_PORT:-4000}:${LITELLM_PORT:-4000}"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro

  proxy:
    profiles: ["proxy-nginx"]
    image: nginx:1.27-alpine
    container_name: litellm-ops-kit-proxy
    restart: unless-stopped
    depends_on:
      - litellm
    ports:
      - "${PROXY_LISTEN_PORT:-8080}:8080"
    volumes:
      - ./proxy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
